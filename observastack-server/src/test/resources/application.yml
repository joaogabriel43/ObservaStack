spring:
  datasource:
    # Testcontainers fornece a URL dinamicamente via @DynamicPropertySource
    # Esta configuração é sobrescrita pelo AbstractIntegrationTest
    url: jdbc:p6spy:postgresql://localhost:5432/observastack_test
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    io.observastack: DEBUG
    org.flywaydb: DEBUG
    p6spy: OFF  # Desabilitado em testes para reduzir ruído no output
