spring:
  application:
    name: observastack-server

  datasource:
    # p6spy — proxy driver para logging de queries SQL e detecção de N+1
    # Em produção, trocar para jdbc:postgresql:// diretamente
    url: jdbc:p6spy:postgresql://localhost:5432/observastack
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: ${POSTGRES_USER:observastack}
    password: ${POSTGRES_PASSWORD:observastack}

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway gerencia o schema; Hibernate apenas valida
    show-sql: false       # p6spy já loga as queries; evitar duplicação
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false   # Boas práticas: desabilitar OSIV

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

# Spring Boot Actuator — exposto para monitoramento
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Informações do serviço (expostas pelo /actuator/info)
info:
  app:
    name: ObservaStack Server
    version: 0.1.0-SNAPSHOT
    description: Servidor central de observabilidade para aplicações Spring Boot

server:
  port: 8080

logging:
  level:
    io.observastack: DEBUG
    org.flywaydb: INFO
    p6spy: TRACE
