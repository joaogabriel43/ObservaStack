# p6spy configuration — SQL query logging and N+1 detection
# Ativo apenas no observastack-server

# Log format: timestamp | duration_ms | SQL | Connection
appender=com.p6spy.engine.spy.appender.Slf4JLogger
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(currentTime) | %(executionTime)ms | %(category) | %(sql)

# Log todas as queries (em produção, considerar filtrar por threshold)
executionThreshold=0

# Filtra queries internas do p6spy
excludecategories=info,debug,result,resultset

# Driver real do PostgreSQL
driverlist=org.postgresql.Driver
